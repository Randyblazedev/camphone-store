<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart - CamPhone Store</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-16">
        <a href="index.html" class="flex items-center gap-2">
          <span class="text-2xl">📱</span>
          <span class="font-extrabold text-xl">Cam<span class="text-blue-500">Phone</span></span>
        </a>
        <div class="hidden md:flex items-center gap-8">
          <a href="index.html" class="text-sm font-semibold text-slate-300 hover:text-white transition-colors">Home</a>
          <a href="index.html#shop" class="text-sm font-semibold text-slate-300 hover:text-white transition-colors">Shop</a>
          <a href="cart.html" class="text-sm font-semibold text-blue-400 relative">
            🛒 Cart
            <span class="cart-badge absolute -top-2 -right-4 bg-blue-500 text-white text-xs w-5 h-5 rounded-full flex items-center justify-center font-bold" style="display:none">0</span>
          </a>
          <a href="admin.html" class="text-sm font-semibold text-slate-300 hover:text-white transition-colors">Admin</a>
        </div>
        <button id="menu-toggle" class="md:hidden text-slate-300 hover:text-white p-2">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
      </div>
    </div>
  </nav>

  <!-- Mobile Menu -->
  <div id="mobile-overlay" class="mobile-overlay"></div>
  <div id="mobile-menu" class="mobile-menu">
    <a href="index.html" class="block py-3 text-lg font-semibold text-slate-300 border-b border-slate-700">Home</a>
    <a href="index.html#shop" class="block py-3 text-lg font-semibold text-slate-300 border-b border-slate-700">Shop</a>
    <a href="cart.html" class="block py-3 text-lg font-semibold text-blue-400 border-b border-slate-700">🛒 Cart</a>
    <a href="admin.html" class="block py-3 text-lg font-semibold text-slate-300">Admin</a>
  </div>

  <!-- Cart Content -->
  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pt-24 pb-20">
    <h1 class="text-3xl font-extrabold mb-8 page-enter">Shopping Cart</h1>

    <div class="grid lg:grid-cols-3 gap-8">
      <!-- Cart Items -->
      <div class="lg:col-span-2">
        <div id="cart-items" class="page-enter">
          <!-- Populated by JS -->
        </div>
      </div>

      <!-- Summary -->
      <div class="lg:col-span-1">
        <div id="cart-summary">
          <!-- Populated by JS -->
        </div>
      </div>
    </div>

    <!-- Empty State -->
    <div id="cart-empty" class="empty-state" style="display:none">
      <div class="empty-state-icon">🛒</div>
      <h2 class="text-2xl font-bold mb-2">Your cart is empty</h2>
      <p class="text-slate-400 mb-6">Looks like you haven't added any phones yet. Start browsing our collection!</p>
      <a href="index.html#shop" class="btn-primary text-lg">📱 Browse Phones</a>
    </div>
  </main>

  <!-- Footer -->
  <footer class="py-8 border-t border-slate-800">
    <div class="max-w-7xl mx-auto px-4 text-center">
      <p class="text-sm text-slate-500">© 2025 CamPhone Store. All rights reserved.</p>
    </div>
  </footer>

  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
  <script src="js/cart.js"></script>
</body>
</html>
